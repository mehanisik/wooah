<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IRON PPL — Your Hypertrophy Tracker</title>
<meta name="description" content="Personal 6-Day Push/Pull/Legs hypertrophy workout tracker with progressive overload, AMRAP tracking, and cloud sync.">
<meta name="theme-color" content="#151716">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRON PPL">
<meta name="referrer" content="no-referrer">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/icon.svg" sizes="any" type="image/svg+xml">
<script>
  (function() {
    var t = localStorage.getItem('ironppl_theme');
    if (t === 'dark') document.documentElement.classList.add('dark');
    else if (t === 'light') document.documentElement.classList.add('light');
  })();
</script>
</head>
<body>

<header class="header">
  <div class="logo">IRON<span>PPL</span></div>
  <div class="header-actions">
    <div class="sync-dot" id="syncDot" title="Offline" aria-label="Sync status"></div>
    <button class="uk-btn uk-btn-default uk-btn-icon header-icon-btn" id="statsBtn" title="Stats" aria-label="View statistics"><i data-lucide="bar-chart-2"></i></button>
    <button class="uk-btn uk-btn-default uk-btn-icon header-icon-btn" id="settingsBtn" title="Settings" aria-label="Open settings"><i data-lucide="settings"></i></button>
  </div>
</header>

<!-- Motivational greeting -->
<div class="greeting" id="greeting"></div>

<!-- Personal stats -->
<div class="stats-bar" id="statsBar"></div>


<nav class="nav" id="nav" role="tablist" aria-label="Workout days"></nav>
<main id="pages" role="tabpanel"></main>

<!-- Rest timer -->
<div class="rest-timer-bar" id="restTimerBar">
  <div class="rest-timer-display" id="restTimerDisplay" aria-live="polite">0:00</div>
  <div class="rest-timer-label" id="restTimerLabel">REST</div>
  <button class="rest-timer-close" id="restTimerClose" aria-label="Close rest timer"><i data-lucide="x"></i></button>
</div>


<div class="toast" id="toast" aria-live="polite" role="status"></div>
<div class="pr-flash" id="prFlash" aria-live="assertive" role="alert"></div>

<!-- Settings Modal -->
<div class="uk-modal" id="settingsModal" data-uk-modal role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
  <div class="uk-modal-dialog" style="max-width:360px;">
    <div class="uk-modal-body">
      <h3 class="uk-modal-title" id="settingsTitle">SETTINGS</h3>
      <div class="setup-step">ACCOUNT</div>
      <div id="authStatus" style="margin-bottom:8px;">NOT SIGNED IN</div>
      <div id="authSignedOut">
        <input class="uk-input setup-input" id="authEmail" type="email" placeholder="you@example.com" autocomplete="email" style="margin-bottom:6px;">
        <button class="uk-btn uk-btn-primary setup-btn" id="authSendLink">SEND MAGIC LINK</button>
      </div>
      <div id="authSignedIn" style="display:none;">
        <button class="uk-btn uk-btn-default setup-btn" id="authSignOut">SIGN OUT</button>
      </div>
      <div class="setup-msg" id="authMsg"></div>
      <div style="margin-top:16px;border-top:1px solid var(--edge);padding-top:12px;">
        <div class="setup-step">THEME</div>
        <div class="theme-toggle" id="themeToggle" style="display:flex;gap:6px;margin-bottom:12px;">
          <button class="uk-btn uk-btn-default setup-btn theme-btn" data-theme="light" style="flex:1;">LIGHT</button>
          <button class="uk-btn uk-btn-default setup-btn theme-btn" data-theme="dark" style="flex:1;">DARK</button>
          <button class="uk-btn uk-btn-default setup-btn theme-btn" data-theme="system" style="flex:1;">SYSTEM</button>
        </div>
      </div>
      <div style="margin-top:12px;border-top:1px solid var(--edge);padding-top:12px;">
        <button class="uk-btn uk-btn-default setup-btn" id="exportData">EXPORT LOCAL DATA (JSON)</button>
      </div>
    </div>
    <div class="uk-modal-footer">
      <button class="uk-btn uk-btn-default" id="settingsClose" aria-label="Close settings">Close</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
