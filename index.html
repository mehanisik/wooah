<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>IRON PPL — Your Hypertrophy Tracker</title>
<meta name="description" content="Personal 6-Day Push/Pull/Legs hypertrophy workout tracker with progressive overload, AMRAP tracking, and cloud sync.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRON PPL">
<meta name="referrer" content="no-referrer">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" as="style">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface-2: #1a1a1a;
  --surface-3: #222222;
  --border: #2a2a2a;
  --border-light: #333;
  --text: #e8e8e8;
  --text-dim: #999;
  --text-muted: #777;
  --accent: #ff3e00;
  --accent-glow: rgba(255, 62, 0, 0.15);
  --accent-dim: #cc3200;
  --green: #00e676;
  --green-dim: rgba(0, 230, 118, 0.15);
  --yellow: #ffd600;
  --yellow-dim: rgba(255, 214, 0, 0.12);
  --blue: #448aff;
  --push-color: #ff3e00;
  --pull-color: #448aff;
  --legs-color: #00e676;
  --rest-color: #555;
  --radius: 4px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Barlow Condensed', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

html {
  font-size: 16px;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior: none;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  overscroll-behavior-y: contain;
  touch-action: manipulation;
}

.set-input, .setup-input, .exercise-select, .neon-conn-str {
  -webkit-user-select: text;
  user-select: text;
  -webkit-touch-callout: default;
  touch-action: auto;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  contain: strict;
  backface-visibility: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  padding-left: calc(16px + env(safe-area-inset-left, 0px));
  padding-right: calc(16px + env(safe-area-inset-right, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--font-display);
  font-size: 1.8rem;
  letter-spacing: 3px;
  color: var(--text);
  line-height: 1;
}

.logo span { color: var(--accent); }

.header-actions { display: flex; gap: 8px; }

.icon-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 1.1rem;
}

.icon-btn:hover, .icon-btn.active {
  color: var(--accent);
  border-color: var(--accent);
  background: var(--accent-glow);
}

/* ===== GREETING ===== */
.greeting {
  padding: 16px 16px 0;
}

.greeting-text {
  font-family: var(--font-display);
  font-size: 1.5rem;
  letter-spacing: 2px;
  line-height: 1.2;
  margin-bottom: 4px;
}

.greeting-sub {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.4;
}

.greeting-sub em {
  color: var(--accent);
  font-style: normal;
  font-weight: 600;
}

/* ===== STATS BAR ===== */
.stats-bar {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 12px 16px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  text-align: center;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 1.6rem;
  letter-spacing: 1px;
  line-height: 1;
  margin-bottom: 2px;
}

.stat-value.fire { color: var(--accent); }
.stat-value.streak { color: var(--yellow); }
.stat-value.prs { color: var(--green); }

.stat-label {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ===== NAV TABS ===== */
.nav {
  display: flex;
  gap: 2px;
  padding: 8px 16px;
  padding-left: calc(16px + env(safe-area-inset-left, 0px));
  padding-right: calc(16px + env(safe-area-inset-right, 0px));
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}

.nav::-webkit-scrollbar { display: none; }

.nav-tab {
  flex: none;
  padding: 10px 14px;
  min-height: 44px;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.82rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  background: none;
  border: 1px solid transparent;
  border-radius: var(--radius);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  position: relative;
  display: flex;
  align-items: center;
}

.nav-tab:hover { color: var(--text-dim); }

.nav-tab.active {
  color: var(--text);
  background: var(--surface);
  border-color: var(--border);
}

.nav-tab.today { color: var(--text-dim); }
.nav-tab.today::before {
  content: '';
  position: absolute;
  top: 4px;
  right: 4px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.nav-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 20%;
  width: 60%;
  height: 2px;
  border-radius: 1px;
}

.nav-tab[data-type="push"].active::after { background: var(--push-color); }
.nav-tab[data-type="pull"].active::after { background: var(--pull-color); }
.nav-tab[data-type="legs"].active::after { background: var(--legs-color); }
.nav-tab[data-type="rest"].active::after { background: var(--rest-color); }
.nav-tab[data-type="info"].active::after { background: var(--yellow); }

.nav-tab .done-dot {
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  margin-left: 4px;
  vertical-align: middle;
}

/* ===== PAGE CONTENT ===== */
.page { display: none; padding: 16px; padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px)); padding-left: calc(16px + env(safe-area-inset-left, 0px)); padding-right: calc(16px + env(safe-area-inset-right, 0px)); content-visibility: auto; }
.page.active { display: block; animation: fadeIn 0.2s ease; content-visibility: visible; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* ===== REST DAY ===== */
.rest-page {
  text-align: center;
  padding: 40px 20px;
}

.rest-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  animation: pulse 3s ease-in-out infinite;
}

.rest-title {
  font-family: var(--font-display);
  font-size: 2.2rem;
  letter-spacing: 4px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.rest-quote {
  font-size: 0.88rem;
  color: var(--text-dim);
  line-height: 1.6;
  max-width: 300px;
  margin: 0 auto 20px;
  font-style: italic;
}

.rest-checklist {
  text-align: left;
  max-width: 280px;
  margin: 0 auto;
  list-style: none;
}

.rest-checklist li {
  font-size: 0.82rem;
  color: var(--text-dim);
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.rest-check {
  width: 18px;
  height: 18px;
  border: 1px solid var(--border-light);
  border-radius: 2px;
  flex-shrink: 0;
}

/* ===== WORKOUT TIMER ===== */
.workout-timer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
}

.workout-timer-icon {
  font-size: 1rem;
  line-height: 1;
}

.workout-timer-display {
  font-family: var(--font-display);
  font-size: 1.4rem;
  letter-spacing: 2px;
  min-width: 70px;
}

.workout-timer-display.active { color: var(--accent); }
.workout-timer-display.finished { color: var(--green); }

.workout-timer-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  flex: 1;
}

.workout-timer-start {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--text-muted);
  letter-spacing: 0.5px;
}

/* ===== WORKOUT VIEW ===== */
.workout-header { margin-bottom: 20px; }

.workout-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 2px;
  margin-bottom: 8px;
}

.workout-tag.push { background: rgba(255,62,0,0.15); color: var(--push-color); }
.workout-tag.pull { background: rgba(68,138,255,0.15); color: var(--pull-color); }
.workout-tag.legs { background: rgba(0,230,118,0.15); color: var(--legs-color); }

.workout-title {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: 3px;
  line-height: 1.1;
  margin-bottom: 4px;
}

.workout-focus {
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* Warm-up collapsible */
.warmup-section { margin-bottom: 16px; }

.warmup-toggle {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
}

.warmup-toggle:hover { color: var(--text); border-color: var(--border-light); }
.warmup-toggle .arrow { transition: transform 0.2s; font-size: 0.7rem; }
.warmup-toggle.open .arrow { transform: rotate(90deg); }

.warmup-content {
  display: none;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 var(--radius) var(--radius);
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.7;
}

.warmup-content.open { display: block; }
.warmup-content li { margin-left: 16px; margin-bottom: 2px; }

/* Exercise cards */
.exercise-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.15s;
}

.exercise-card:hover { border-color: var(--border-light); }

.exercise-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
}

.exercise-num {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-muted);
  background: var(--surface-2);
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 2px;
  flex-shrink: 0;
  margin-top: 1px;
}

.exercise-num.done { background: var(--green-dim); color: var(--green); }

.exercise-info { flex: 1; min-width: 0; }

.exercise-name {
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.3px;
  margin-bottom: 3px;
}

.exercise-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-dim);
}

.exercise-meta span { display: flex; align-items: center; gap: 3px; }

.exercise-note {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
  line-height: 1.4;
  font-style: italic;
}

.superset-badge {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--yellow-dim);
  color: var(--yellow);
  margin-top: 4px;
  display: inline-block;
}

.pr-badge {
  font-family: var(--font-mono);
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 2px;
  background: var(--green-dim);
  color: var(--green);
  margin-top: 4px;
  margin-left: 4px;
  display: inline-block;
}

.exercise-expand {
  color: var(--text-muted);
  font-size: 0.8rem;
  flex-shrink: 0;
  padding: 2px;
  transition: transform 0.2s;
}

.exercise-card.open .exercise-expand { transform: rotate(180deg); }

/* Logging panel */
.exercise-log {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
}

.exercise-card.open .exercise-log { display: block; }

.set-row {
  display: grid;
  grid-template-columns: 36px 1fr 1fr 48px;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}

.set-row:last-child { border-bottom: none; }

.set-row.header {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding-bottom: 8px;
}

.set-label {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-dim);
}

.set-label.amrap { color: var(--accent); }

.set-input {
  width: 100%;
  padding: 10px;
  min-height: 44px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 16px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
}

.set-input:focus { border-color: var(--accent); }
.set-input::placeholder { color: var(--text-muted); }

.set-check {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1rem;
  transition: all 0.15s;
  justify-self: center;
}

.set-check.done {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

/* Previous performance */
.prev-performance { padding: 8px 0; margin-top: 4px; }

.prev-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.prev-sets { display: flex; gap: 6px; flex-wrap: wrap; }

.prev-set {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-dim);
  background: var(--surface-3);
  padding: 3px 8px;
  border-radius: 2px;
}

/* Progression indicator */
.progression-bar {
  margin-top: 8px;
  padding: 8px 0;
  border-top: 1px solid var(--border);
}

.progression-msg {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.progression-msg.up { color: var(--green); }
.progression-msg.hold { color: var(--yellow); }
.progression-msg.down { color: var(--accent); }

/* ===== REST TIMER ===== */
.rest-timer-bar {
  display: none;
  position: fixed;
  bottom: calc(70px + env(safe-area-inset-bottom, 0px));
  left: calc(16px + env(safe-area-inset-left, 0px));
  right: calc(16px + env(safe-area-inset-right, 0px));
  padding: 10px 14px;
  background: var(--surface-2);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  z-index: 60;
  align-items: center;
  gap: 10px;
}

.rest-timer-bar.visible { display: flex; }

.rest-timer-display {
  font-family: var(--font-display);
  font-size: 1.8rem;
  letter-spacing: 2px;
  min-width: 70px;
  text-align: center;
}

.rest-timer-display.warning { color: var(--yellow); }
.rest-timer-display.done { color: var(--green); }

.rest-timer-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  flex: 1;
}

.rest-timer-close {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.9rem;
}

/* ===== INFO PAGES ===== */
.info-section { margin-bottom: 24px; }

.info-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  letter-spacing: 2px;
  margin-bottom: 12px;
  color: var(--text);
}

.info-subtitle {
  font-weight: 600;
  font-size: 0.88rem;
  letter-spacing: 0.5px;
  color: var(--text);
  margin-bottom: 8px;
  margin-top: 16px;
}

.info-list {
  list-style: none;
  margin-bottom: 12px;
}

.info-list li {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.8;
  padding-left: 16px;
  position: relative;
}

.info-list li::before {
  content: '>';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.7rem;
}

.info-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 12px;
}

.info-table th, .info-table td {
  padding: 8px 12px;
  text-align: left;
  font-size: 0.78rem;
  border-bottom: 1px solid var(--border);
}

.info-table th {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface);
}

.info-table td { color: var(--text-dim); }

.term-card {
  display: flex;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 6px;
}

.term-abbr {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;

    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
  if (!state.startDate) {
    state.startDate = new Date().toISOString().split('T')[0];
    saveState();
  }
}

function saveState() {
  try { localStorage.setItem('ironppl_state_v2', JSON.stringify(state)); } catch(e) {}
}

// ===== HELPERS =====
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function logKey(dayIdx, exIdx, setIdx) { return `w${state.currentWeek}-d${dayIdx}-e${exIdx}-s${setIdx}`; }
function historyKey(dayIdx, exIdx) { return `d${dayIdx}-e${exIdx}`; }
function finishedKey(dayIdx) { return `w${state.currentWeek}-d${dayIdx}`; }

function getLog(dayIdx, exIdx, setIdx) {
  return state.logs[logKey(dayIdx, exIdx, setIdx)] || { weight: '', reps: '', done: false };
}

function setLog(dayIdx, exIdx, setIdx, data) {
  state.logs[logKey(dayIdx, exIdx, setIdx)] = data;
  saveState();
}

function getHistory(dayIdx, exIdx) { return state.history[historyKey(dayIdx, exIdx)] || []; }

function getLastSession(dayIdx, exIdx) {
  const h = getHistory(dayIdx, exIdx);
  return h.length > 0 ? h[h.length - 1] : null;
}

function parseRepRange(reps) {
  const clean = reps.replace(/[^0-9-]/g, '');
  const parts = clean.split('-').map(Number);
  return { low: parts[0] || 0, high: parts[parts.length - 1] || parts[0] || 0 };
}

function showToast(msg) {
  const toast = $('#toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function isDayComplete(dayIdx) {
  const day = PROGRAM[dayIdx];
  if (!day.exercises.length) return false;
  for (let e = 0; e < day.exercises.length; e++) {
    for (let s = 0; s < day.exercises[e].sets; s++) {
      if (!getLog(dayIdx, e, s).done) return false;
    }
  }
  return true;
}

function isDayFinished(dayIdx) {
  return !!state.finishedDays[finishedKey(dayIdx)];
}

function getTodayDayIdx() {
  const jsDay = new Date().getDay(); // 0=Sun, 1=Mon...
  return jsDay === 0 ? 6 : jsDay - 1; // Convert to 0=Mon...6=Sun
}

function getCompletedThisWeek() {
  let count = 0;
  for (let d = 0; d < 6; d++) {
    if (isDayFinished(d)) count++;
  }
  return count;
}

function getStreak() {
  // Count consecutive finished days backwards from most recent
  let streak = 0;
  for (let w = state.currentWeek; w >= 1; w--) {
    for (let d = 5; d >= 0; d--) {
      if (state.finishedDays[`w${w}-d${d}`]) {
        streak++;
      } else if (streak > 0) {
        return streak;
      }
    }
  }
  return streak;
}

function getPRCount() {
  return Object.keys(state.personalRecords).length;
}

function checkForPR(dayIdx, exIdx) {
  const key = historyKey(dayIdx, exIdx);
  const ex = PROGRAM[dayIdx].exercises[exIdx];
  if (!ex) return false;

  // Get best set from current session
  let bestVolume = 0;
  for (let s = 0; s < ex.sets; s++) {
    const log = getLog(dayIdx, exIdx, s);
    const vol = (parseFloat(log.weight) || 0) * (parseInt(log.reps) || 0);
    bestVolume = Math.max(bestVolume, vol);
  }

  // Compare with history
  const prev = state.personalRecords[key];
  if (bestVolume > 0 && (!prev || bestVolume > prev.volume)) {
    state.personalRecords[key] = {
      volume: bestVolume,
      date: new Date().toISOString().split('T')[0]
    };
    return true;
  }
  return false;
}

function formatRest(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m > 0 ? (s > 0 ? `${m}m ${s}s` : `${m} min`) : `${sec}s`;
}

function timerKey(dayIdx) { return `w${state.currentWeek}-d${dayIdx}`; }

function getWorkoutTimer(dayIdx) {
  return state.workoutTimers[timerKey(dayIdx)] || null;
}

function startWorkoutTimer(dayIdx) {
  const key = timerKey(dayIdx);
  if (state.workoutTimers[key]) return;
  state.workoutTimers[key] = { startedAt: new Date().toISOString(), finishedAt: null, duration: 0 };
  saveState();
}

function stopWorkoutTimer(dayIdx) {
  const key = timerKey(dayIdx);
  const timer = state.workoutTimers[key];
  if (!timer || timer.finishedAt) return;
  timer.finishedAt = new Date().toISOString();
  timer.duration = Math.round((new Date(timer.finishedAt) - new Date(timer.startedAt)) / 1000);
  saveState();
}

function formatDuration(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatTimeShort(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

let workoutTimerInterval = null;

function startWorkoutClock(dayIdx) {
  clearInterval(workoutTimerInterval);
  workoutTimerInterval = setInterval(() => {
    const display = $(`#workoutTimerDisplay-${dayIdx}`);
    if (!display) { clearInterval(workoutTimerInterval); return; }
    const timer = getWorkoutTimer(dayIdx);
    if (!timer || timer.finishedAt) { clearInterval(workoutTimerInterval); return; }
    const elapsed = Math.round((Date.now() - new Date(timer.startedAt).getTime()) / 1000);
    display.textContent = formatDuration(elapsed);
  }, 1000);
}

// ===== REST TIMER =====
let restTimerInterval = null;
let restTimerRemaining = 0;

function startRestTimer(seconds, exerciseName) {
  clearInterval(restTimerInterval);
  restTimerRemaining = seconds;
  const bar = $('#restTimerBar');
  const display = $('#restTimerDisplay');
  const label = $('#restTimerLabel');

  bar.classList.add('visible');
  label.textContent = exerciseName || 'REST';
  display.className = 'rest-timer-display';

  function tick() {
    const m = Math.floor(restTimerRemaining / 60);
    const s = restTimerRemaining % 60;
    display.textContent = `${m}:${s.toString().padStart(2, '0')}`;

    if (restTimerRemaining <= 10 && restTimerRemaining > 0) {
      display.className = 'rest-timer-display warning';
    }

    if (restTimerRemaining <= 0) {
      display.className = 'rest-timer-display done';
      display.textContent = 'GO!';
      label.textContent = 'TIME TO LIFT';
      clearInterval(restTimerInterval);

      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      setTimeout(() => { bar.classList.remove('visible'); }, 4000);
      return;
    }
    restTimerRemaining--;
  }

  tick();
  restTimerInterval = setInterval(tick, 1000);
}

$('#restTimerClose').addEventListener('click', () => {
  clearInterval(restTimerInterval);
  $('#restTimerBar').classList.remove('visible');
});

function renderNav() {
  const nav = $('#nav');

  const tabs = PROGRAM.map((d, i) => {
    const isToday = i === todayIdx;
    const done = isDayFinished(i);
    const typeAttr = d.type;
    const classes = ['nav-tab'];
    if (i === state.activeTab) classes.push('active');
    if (isToday) classes.push('today');
    const doneDot = done ? '<span class="done-dot"></span>' : '';
    return `<button class="${classes.join(' ')}" data-idx="${i}" data-type="${typeAttr}">${d.day}${doneDot}</button>`;
  });

  nav.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      state.activeTab = parseInt(tab.dataset.idx);
      saveState();
      renderNav();
      renderPages();
      updateFinishBar();
    });

}

function renderWorkoutPage(day, dayIdx) {
  let h = '';

  h += `<div class="workout-header">

  if (timer) {

    const elapsed = isRunning
      ? Math.round((Date.now() - new Date(timer.startedAt).getTime()) / 1000)
      : timer.duration;
    h += `<div class="workout-timer">
      <span class="workout-timer-icon">${isRunning ? '&#x23F1;' : '&#x2705;'}</span>
      <span class="workout-timer-display ${isRunning ? 'active' : 'finished'}" id="workoutTimerDisplay-${dayIdx}">${formatDuration(elapsed)}</span>
      <span class="workout-timer-label">${isRunning ? 'ELAPSED' : 'TOTAL TIME'}</span>
      <span class="workout-timer-start">${formatTimeShort(timer.startedAt)}${timer.finishedAt ? ' — ' + formatTimeShort(timer.finishedAt) : ''}</span>
    </div>`;
  }

  h += `<div class="warmup-section">

    </button>

        <li>Specific: ${day.warmup}</li>
      </ul>
    </div>
  </div>`;

  day.exercises.forEach((ex, exIdx) => {
    h += renderExerciseCard(ex, dayIdx, exIdx);
  });

  return h;
}

function renderExerciseCard(ex, dayIdx, exIdx) {
  let h = '';
  const allDone = Array.from({length: ex.sets}, (_, i) => getLog(dayIdx, exIdx, i).done).every(Boolean);
  const prKey = historyKey(dayIdx, exIdx);
  const hasPR = !!state.personalRecords[prKey];

  h += `<div class="exercise-card" data-day="${dayIdx}" data-ex="${exIdx}">`;
  h += `<div class="exercise-top">`;
  h += `<div class="exercise-num ${allDone ? 'done' : ''}">${exIdx + 1}</div>`;
  h += `<div class="exercise-info">`;
  h += `<div class="exercise-name">${ex.name}</div>`;
  h += `<div class="exercise-meta">`;
  h += `<span>${ex.sets} x ${ex.reps}</span>`;
  h += `<span>&#x23F1; ${formatRest(ex.rest)}</span>`;
  h += `<span>RIR ${ex.rir}</span>`;
  if (ex.amrap) h += `<span style="color:var(--accent);">AMRAP</span>`;
  h += `</div>`;
  if (ex.notes) h += `<div class="exercise-note">${ex.notes}</div>`;
  if (ex.superset) h += `<span class="superset-badge">&#x26A1; Superset</span>`;
  if (hasPR) h += `<span class="pr-badge">&#x1F3C6; PR</span>`;
  h += `</div>`;
  h += `<div class="exercise-expand">&#x25BC;</div>`;
  h += `</div>`;

  h += `<div class="exercise-log">`;

  const lastSession = getLastSession(dayIdx, exIdx);
  if (lastSession) {
    h += `<div class="prev-performance">`;
    h += `<div class="prev-label">Previous (Week ${lastSession.week})</div>`;
    h += `<div class="prev-sets">`;
    lastSession.sets.forEach(s => { h += `<span class="prev-set">${s.weight}kg x ${s.reps}</span>`; });
    h += `</div></div>`;
  }

  h += `<div class="set-row header"><span>#</span><span>KG</span><span>REPS</span><span></span></div>`;

  for (let s = 0; s < ex.sets; s++) {
    const log = getLog(dayIdx, exIdx, s);
    const isAmrapSet = ex.amrap && s === ex.sets - 1;

    h += `<div class="set-row" data-day="${dayIdx}" data-ex="${exIdx}" data-set="${s}" data-rest="${ex.rest}">`;
    h += `<span class="set-label ${isAmrapSet ? 'amrap' : ''}">${isAmrapSet ? 'A' : s + 1}</span>`;
    h += `<input class="set-input weight-input" type="number" inputmode="decimal" step="0.5" placeholder="—" value="${log.weight || ''}" data-field="weight">`;
    h += `<input class="set-input reps-input" type="number" inputmode="numeric" placeholder="${isAmrapSet ? '5+' : ex.reps}" value="${log.reps || ''}" data-field="reps">`;
    h += `<div class="set-check ${log.done ? 'done' : ''}" data-action="toggle">${log.done ? '&#x2713;' : ''}</div>`;
    h += `</div>`;
  }

  h += renderProgression(ex, dayIdx, exIdx);
  h += `</div>`;
  h += `</div>`;
  return h;
}

function renderProgression(ex, dayIdx, exIdx) {
  const lastSession = getLastSession(dayIdx, exIdx);
  if (!lastSession) return '';

  const currentSets = [];
  for (let s = 0; s < ex.sets; s++) currentSets.push(getLog(dayIdx, exIdx, s));
  if (!currentSets.every(s => s.done)) return '';

  let h = '<div class="progression-bar">';

  if (ex.compound && ex.amrap) {
    const currentAmrap = currentSets[currentSets.length - 1];
    if (currentAmrap.reps >= 5) {
      h += `<div class="progression-msg up">&#x2191; Add 2.5kg next session (AMRAP: ${currentAmrap.reps} reps)</div>`;
    } else {
      h += `<div class="progression-msg hold">&#x25CF; Keep weight, aim for 5+ AMRAP reps</div>`;
    }
  } else {
    const range = parseRepRange(ex.reps);
    const allAtTop = currentSets.every(s => parseInt(s.reps) >= range.high);
    if (allAtTop) {
      h += `<div class="progression-msg up">&#x2191; Increase weight next session (all sets hit ${range.high} reps)</div>`;
    } else {
      const avgReps = currentSets.reduce((a, s) => a + (parseInt(s.reps) || 0), 0) / currentSets.length;
      h += `<div class="progression-msg hold">&#x25CF; Build to ${range.high} reps on all sets (avg: ${avgReps.toFixed(0)})</div>`;
    }
  }

  h += '</div>';
  return h;
}

// ===== EVENT LISTENERS =====
function attachExerciseListeners() {
  $$('.exercise-top').forEach(top => {
    top.addEventListener('click', () => { top.closest('.exercise-card').classList.toggle('open'); });
  });

  $$('.warmup-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const content = $(`[data-warmup-content="${btn.dataset.warmup}"]`);
      btn.classList.toggle('open');
      content.classList.toggle('open');
    });
  });

  $$('.set-row:not(.header)').forEach(row => {
    const dayIdx = parseInt(row.dataset.day);
    const exIdx = parseInt(row.dataset.ex);
    const setIdx = parseInt(row.dataset.set);
    const restSec = parseInt(row.dataset.rest);

    row.querySelectorAll('.set-input').forEach(input => {
      input.addEventListener('input', () => {
        const current = getLog(dayIdx, exIdx, setIdx);
        current[input.dataset.field] = input.value;
        setLog(dayIdx, exIdx, setIdx, current);
      });
      input.addEventListener('click', e => e.stopPropagation());
    });

    const check = row.querySelector('.set-check');
    if (check) {
      check.addEventListener('click', (e) => {
        e.stopPropagation();
        const current = getLog(dayIdx, exIdx, setIdx);
        current.done = !current.done;

        // Auto-start workout timer on first set check
        if (current.done && !getWorkoutTimer(dayIdx)) {
          startWorkoutTimer(dayIdx);
          const timerData = getWorkoutTimer(dayIdx);
          const page = row.closest('.page');
          const warmup = page.querySelector('.warmup-section');
          if (warmup) {
            const timerEl = document.createElement('div');
            timerEl.className = 'workout-timer';
            timerEl.innerHTML = `<span class="workout-timer-icon">&#x23F1;</span><span class="workout-timer-display active" id="workoutTimerDisplay-${dayIdx}">0:00</span><span class="workout-timer-label">ELAPSED</span><span class="workout-timer-start">${formatTimeShort(timerData.startedAt)}</span>`;
            warmup.before(timerEl);
          }
          startWorkoutClock(dayIdx);
        }

        if (current.done && !current.weight) {
          if (setIdx > 0) {
            const prev = getLog(dayIdx, exIdx, setIdx - 1);
            if (prev.weight) current.weight = prev.weight;
          } else {
            const last = getLastSession(dayIdx, exIdx);
            if (last && last.sets[0]) current.weight = last.sets[0].weight;
          }
        }

        setLog(dayIdx, exIdx, setIdx, current);

        if (current.done) {
          check.classList.add('done');
          check.innerHTML = '&#x2713;';
          // Start rest timer
          const ex = PROGRAM[dayIdx].exercises[exIdx];
          startRestTimer(restSec, ex.name);
        } else {
          check.classList.remove('done');
          check.innerHTML = '';
        }

        const weightInput = row.querySelector('.weight-input');
        if (current.weight && !weightInput.value) weightInput.value = current.weight;

        // Update exercise num indicator
        const card = row.closest('.exercise-card');
        const ex = PROGRAM[dayIdx].exercises[exIdx];
        const allDone = Array.from({length: ex.sets}, (_, i) => getLog(dayIdx, exIdx, i).done).every(Boolean);
        const numEl = card.querySelector('.exercise-num');
        if (allDone) numEl.classList.add('done');
        else numEl.classList.remove('done');

        updateFinishBar();
      });
    }
  });
}

function updateFinishBar() {
  const bar = $('#finishBar');
  const btn = $('#finishBtn');
  const dayIdx = state.activeTab;

  if (dayIdx >= PROGRAM.length || PROGRAM[dayIdx].type === 'rest' || dayIdx === 7 || dayIdx === 8) {
    bar.classList.remove('visible');
    return;
  }

  bar.classList.add('visible');

  if (isDayFinished(dayIdx)) {
    btn.disabled = true;
    btn.textContent = 'WORKOUT COMPLETE';
    return;
  }

  const complete = isDayComplete(dayIdx);
  btn.disabled = !complete;
  btn.textContent = complete ? 'FINISH WORKOUT' : 'COMPLETE ALL SETS';
}

// ===== FINISH WORKOUT =====
function finishWorkout() {
  const dayIdx = state.activeTab;
  if (!isDayComplete(dayIdx) || isDayFinished(dayIdx)) return;

  const day = PROGRAM[dayIdx];
  let newPRs = 0;

  day.exercises.forEach((ex, exIdx) => {
    const key = historyKey(dayIdx, exIdx);
    if (!state.history[key]) state.history[key] = [];

    const sets = [];
    for (let s = 0; s < ex.sets; s++) {
      const log = getLog(dayIdx, exIdx, s);
      sets.push({ weight: parseFloat(log.weight) || 0, reps: parseInt(log.reps) || 0 });
    }

    // Check PR before saving history
    if (checkForPR(dayIdx, exIdx)) newPRs++;

    state.history[key].push({ week: state.currentWeek, sets });
    if (state.history[key].length > 12) state.history[key] = state.history[key].slice(-12);
  });

  stopWorkoutTimer(dayIdx);
  clearInterval(workoutTimerInterval);
  state.finishedDays[finishedKey(dayIdx)] = Date.now();
  state.totalSessions++;
  saveState();

  syncToNeon(dayIdx);

  const wTimer = getWorkoutTimer(dayIdx);
  const durationStr = wTimer && wTimer.duration ? ` (${formatDuration(wTimer.duration)})` : '';

  if (newPRs > 0) {
    const flash = $('#prFlash');
    flash.classList.add('show');
    setTimeout(() => flash.classList.remove('show'), 1500);
    showToast(`${day.name} done${durationStr}! ${newPRs} new PR${newPRs > 1 ? 's' : ''}!`);
  } else {
    showToast(`${day.name} logged${durationStr} — Week ${state.currentWeek}`);
  }

  renderGreeting();
  renderStats();
  renderNav();
  renderPages();
  updateFinishBar();
}

// ===== STATS PAGE =====
function renderStatsPage() {
  const allExercises = [];
  PROGRAM.forEach((day, dayIdx) => {
    if (day.type === 'rest') return;
    day.exercises.forEach((ex, exIdx) => {
      const key = historyKey(dayIdx, exIdx);
      const h = state.history[key];
      if (h && h.length > 0) {
        allExercises.push({ name: ex.name, dayIdx, exIdx, key, type: day.type });
      }
    });
  });

  if (allExercises.length === 0) {
    return `<div class="no-data-msg"><strong>NO DATA YET</strong>Finish your first workout to see stats here.<br>Every session you complete builds your progress history.</div>`;
  }

  let h = '';

  // Summary stats
  const totalSessions = state.totalSessions || 0;
  const totalPRs = getPRCount();
  const totalWeeks = state.currentWeek;
  let totalVolume = 0;
  Object.values(state.history).forEach(sessions => {
    sessions.forEach(sess => {
      sess.sets.forEach(s => { totalVolume += (s.weight || 0) * (s.reps || 0); });
    });
  });

  h += `<div class="info-section">
    <div class="info-title">YOUR JOURNEY</div>
    <div class="stat-row"><span class="stat-row-label">Total Sessions</span><span class="stat-row-value">${totalSessions}</span></div>
    <div class="stat-row"><span class="stat-row-label">Current Week</span><span class="stat-row-value">${totalWeeks}</span></div>
    <div class="stat-row"><span class="stat-row-label">Personal Records</span><span class="stat-row-value up">${totalPRs}</span></div>
    <div class="stat-row"><span class="stat-row-label">Total Volume Lifted</span><span class="stat-row-value">${totalVolume >= 1000 ? (totalVolume / 1000).toFixed(1) + ' t' : totalVolume.toFixed(0) + ' kg'}</span></div>
    <div class="stat-row"><span class="stat-row-label">Avg Workout Time</span><span class="stat-row-value">${(() => {
      const durations = Object.values(state.workoutTimers || {}).filter(t => t.duration > 0).map(t => t.duration);
      if (durations.length === 0) return '—';
      const avg = Math.round(durations.reduce((a, b) => a + b, 0) / durations.length);
      return formatDuration(avg);
    })()}</span></div>
    <div class="stat-row"><span class="stat-row-label">Training Since</span><span class="stat-row-value">${state.startDate || '—'}</span></div>
  </div>`;

  // Exercise selector for progression chart
  h += `<div class="chart-section">
    <div class="chart-title">WEIGHT PROGRESSION</div>
    <div class="chart-subtitle">Select exercise to view history</div>
    <select class="exercise-select" id="statsExerciseSelect">`;
  allExercises.forEach((ex, i) => {
    h += `<option value="${ex.key}" ${i === 0 ? 'selected' : ''}>${ex.name}</option>`;
  });
  h += `</select>
    <div id="progressionChart"></div>
  </div>`;

  // Volume by workout type
  h += `<div class="chart-section">
    <div class="chart-title">WEEKLY VOLUME</div>
    <div class="chart-subtitle">Total weight × reps per week</div>
    <div id="volumeChart"></div>
  </div>`;

  // PR list
  const prEntries = Object.entries(state.personalRecords);
  if (prEntries.length > 0) {
    h += `<div class="info-section">
      <div class="info-title">PERSONAL RECORDS</div>`;
    prEntries.forEach(([key, pr]) => {
      const parts = key.match(/d(\d+)-e(\d+)/);
      if (!parts) return;
      const dayIdx = parseInt(parts[1]);
      const exIdx = parseInt(parts[2]);
      const ex = PROGRAM[dayIdx]?.exercises?.[exIdx];
      if (!ex) return;
      h += `<div class="stat-row">
        <span class="stat-row-label">${ex.name}</span>
        <span class="stat-row-value up">${pr.volume.toFixed(0)} vol · ${pr.date}</span>
      </div>`;
    });
    h += `</div>`;
  }

  return h;
}

function renderProgressionChart(exerciseKey) {
  const container = $('#progressionChart');
  if (!container) return;
  const history = state.history[exerciseKey];
  if (!history || history.length === 0) {
    container.innerHTML = '<div class="no-data-msg">No history for this exercise yet.</div>';
    return;
  }

  const data = history.map(sess => ({
    week: sess.week,
    maxWeight: Math.max(...sess.sets.map(s => s.weight || 0)),
    totalVolume: sess.sets.reduce((a, s) => a + (s.weight || 0) * (s.reps || 0), 0),
    topSet: sess.sets.reduce((best, s) => {
      const v = (s.weight || 0) * (s.reps || 0);
      return v > best.vol ? { w: s.weight, r: s.reps, vol: v } : best;
    }, { w: 0, r: 0, vol: 0 })
  }));

  const maxW = Math.max(...data.map(d => d.maxWeight));

  let h = '<div class="chart-bars">';
  data.forEach(d => {
    const pct = maxW > 0 ? (d.maxWeight / maxW) * 100 : 0;
    h += `<div class="chart-bar-col">
      <div class="chart-bar-value">${d.maxWeight}</div>
      <div class="chart-bar accent" style="height:${Math.max(pct, 3)}%"></div>
      <div class="chart-bar-label">W${d.week}</div>
    </div>`;
  });
  h += '</div>';

  // Best set details
  const latest = data[data.length - 1];
  const prev = data.length > 1 ? data[data.length - 2] : null;
  const diff = prev ? latest.maxWeight - prev.maxWeight : 0;

  h += `<div style="margin-top:12px;">
    <div class="stat-row"><span class="stat-row-label">Latest Max</span><span class="stat-row-value">${latest.maxWeight} kg</span></div>
    <div class="stat-row"><span class="stat-row-label">Best Set</span><span class="stat-row-value">${latest.topSet.w}kg × ${latest.topSet.r}</span></div>`;
  if (prev) {
    h += `<div class="stat-row"><span class="stat-row-label">Change</span><span class="stat-row-value ${diff > 0 ? 'up' : diff < 0 ? 'down' : ''}">${diff > 0 ? '+' : ''}${diff} kg</span></div>`;
  }
  h += `</div>`;

  container.innerHTML = h;
}

function renderVolumeChart() {
  const container = $('#volumeChart');
  if (!container) return;

  const weeklyVol = {};
  Object.entries(state.history).forEach(([key, sessions]) => {
    sessions.forEach(sess => {
      if (!weeklyVol[sess.week]) weeklyVol[sess.week] = { push: 0, pull: 0, legs: 0 };
      const parts = key.match(/d(\d+)/);
      if (!parts) return;
      const dayIdx = parseInt(parts[1]);
      const type = PROGRAM[dayIdx]?.type || 'push';
      sess.sets.forEach(s => { weeklyVol[sess.week][type] += (s.weight || 0) * (s.reps || 0); });
    });
  });

  const weeks = Object.keys(weeklyVol).map(Number).sort((a, b) => a - b).slice(-8);
  if (weeks.length === 0) {
    container.innerHTML = '<div class="no-data-msg">Complete workouts to see volume trends.</div>';
    return;
  }

  const maxVol = Math.max(...weeks.map(w => weeklyVol[w].push + weeklyVol[w].pull + weeklyVol[w].legs));

  let h = '<div class="chart-bars" style="height:140px;">';
  weeks.forEach(w => {
    const total = weeklyVol[w].push + weeklyVol[w].pull + weeklyVol[w].legs;
    const pct = maxVol > 0 ? (total / maxVol) * 100 : 0;
    h += `<div class="chart-bar-col">
      <div class="chart-bar-value">${total >= 1000 ? (total / 1000).toFixed(0) + 'k' : total}</div>
      <div class="chart-bar green" style="height:${Math.max(pct, 3)}%"></div>
      <div class="chart-bar-label">W${w}</div>
    </div>`;
  });
  h += '</div>';

  // Breakdown for latest week
  const latestWeek = weeks[weeks.length - 1];
  const lv = weeklyVol[latestWeek];
  h += `<div style="margin-top:12px;">
    <div class="stat-row"><span class="stat-row-label">Push Volume</span><span class="stat-row-value" style="color:var(--push-color);">${lv.push.toFixed(0)} kg</span></div>
    <div class="stat-row"><span class="stat-row-label">Pull Volume</span><span class="stat-row-value" style="color:var(--pull-color);">${lv.pull.toFixed(0)} kg</span></div>
    <div class="stat-row"><span class="stat-row-label">Legs Volume</span><span class="stat-row-value" style="color:var(--legs-color);">${lv.legs.toFixed(0)} kg</span></div>
  </div>`;

  container.innerHTML = h;
}

function attachStatsListeners() {
  const sel = $('#statsExerciseSelect');
  if (sel) {
    renderProgressionChart(sel.value);
    renderVolumeChart();
    sel.addEventListener('change', () => renderProgressionChart(sel.value));
  }
}

// ===== NEONDB INTEGRATION =====
let neonSQL = null;

function getNeonConfig() {
  try {
    return localStorage.getItem('ironppl_neon') || null;
  } catch { return null; }
}

function saveNeonConfig(connStr) {
  localStorage.setItem('ironppl_neon', connStr);
}

function clearNeonConfig() {
  localStorage.removeItem('ironppl_neon');
}

async function initNeon() {
  const connStr = getNeonConfig();
  if (!connStr) return false;
  try {
    const { neon } = await import('https://esm.sh/@neondatabase/serverless@0.10.4');
    neonSQL = neon(connStr);
    updateSyncDot('online');
    return true;
  } catch {
    neonSQL = null;
    return false;
  }
}

function updateSyncDot(status) {
  const dot = $('#syncDot');
  dot.className = 'sync-dot ' + status;
  dot.title = status === 'online' ? 'Cloud synced' : status === 'syncing' ? 'Syncing...' : 'Offline (local only)';
}

function updateSettingsUI() {
  const connStr = getNeonConfig();
  const input = $('#neonConnStr');
  const connectBtn = $('#neonConnect');
  const disconnectBtn = $('#neonDisconnect');
  const testBtn = $('#neonTest');
  const statusEl = $('#neonStatus');

  if (connStr) {
    input.value = connStr;
    input.disabled = true;
    connectBtn.style.display = 'none';
    disconnectBtn.style.display = 'block';
    testBtn.style.display = 'block';
    statusEl.textContent = neonSQL ? 'CONNECTED' : 'SAVED (NOT VERIFIED)';
    statusEl.style.color = neonSQL ? 'var(--green)' : 'var(--yellow)';
  } else {
    input.value = '';
    input.disabled = false;
    connectBtn.style.display = 'block';
    disconnectBtn.style.display = 'none';
    testBtn.style.display = 'none';
    statusEl.textContent = 'NOT CONNECTED';
    statusEl.style.color = '';
  }
}

async function syncToNeon(dayIdx) {
  if (!neonSQL) return;
  updateSyncDot('syncing');

  try {
    const day = PROGRAM[dayIdx];

    const wTimer = getWorkoutTimer(dayIdx);
    const startedAt = wTimer ? wTimer.startedAt : new Date().toISOString();
    const duration = wTimer ? wTimer.duration : 0;

    const sessionResult = await neonSQL`
      INSERT INTO sessions (week, day_index, day_name, workout_type, started_at, finished_at, duration_sec)
      VALUES (${state.currentWeek}, ${dayIdx}, ${day.name}, ${day.type}, ${startedAt}, ${new Date().toISOString()}, ${duration})
      RETURNING id`;

    const sessionId = sessionResult[0].id;

    for (let exIdx = 0; exIdx < day.exercises.length; exIdx++) {
      const ex = day.exercises[exIdx];
      for (let s = 0; s < ex.sets; s++) {
        const log = getLog(dayIdx, exIdx, s);
        await neonSQL`
          INSERT INTO sets (session_id, exercise_index, exercise_name, set_index, weight, reps, is_amrap)
          VALUES (${sessionId}, ${exIdx}, ${ex.name}, ${s},
                  ${parseFloat(log.weight) || 0}, ${parseInt(log.reps) || 0},
                  ${!!(ex.amrap && s === ex.sets - 1)})`;
      }
    }

    for (let exIdx = 0; exIdx < day.exercises.length; exIdx++) {
      const ex = day.exercises[exIdx];
      const prKey = historyKey(dayIdx, exIdx);
      const pr = state.personalRecords[prKey];
      if (!pr) continue;

      let bestW = 0, bestR = 0;
      for (let s = 0; s < ex.sets; s++) {
        const log = getLog(dayIdx, exIdx, s);
        const w = parseFloat(log.weight) || 0;
        const r = parseInt(log.reps) || 0;
        if (w * r > bestW * bestR) { bestW = w; bestR = r; }
      }

      await neonSQL`
        INSERT INTO personal_records (day_index, exercise_index, exercise_name, best_weight, best_reps, best_volume, achieved_at)
        VALUES (${dayIdx}, ${exIdx}, ${ex.name}, ${bestW}, ${bestR}, ${pr.volume}, ${pr.date})
        ON CONFLICT (day_index, exercise_index)
        DO UPDATE SET best_weight = EXCLUDED.best_weight, best_reps = EXCLUDED.best_reps,
                      best_volume = EXCLUDED.best_volume, achieved_at = EXCLUDED.achieved_at
        WHERE EXCLUDED.best_volume > personal_records.best_volume`;
    }

    updateSyncDot('online');
    showToast('Synced to cloud');
  } catch (err) {
    updateSyncDot('offline');
    console.error('Sync error:', err);
  }
}

// ===== SETTINGS HANDLERS =====
$('#settingsBtn').addEventListener('click', () => {
  updateSettingsUI();
  $('#settingsModal').classList.add('open');
});

$('#settingsClose').addEventListener('click', () => {
  $('#settingsModal').classList.remove('open');
});

$('#settingsModal').addEventListener('click', (e) => {
  if (e.target === $('#settingsModal')) $('#settingsModal').classList.remove('open');
});

$('#neonConnect').addEventListener('click', async () => {
  const connStr = $('#neonConnStr').value.trim();
  if (!connStr || !connStr.startsWith('postgresql://')) {
    $('#settingsMsg').textContent = 'Enter a valid PostgreSQL connection string';
    $('#settingsMsg').className = 'setup-msg error';
    return;
  }
  saveNeonConfig(connStr);
  $('#neonConnect').disabled = true;
  $('#neonConnect').textContent = 'CONNECTING...';
  const ok = await initNeon();
  $('#neonConnect').disabled = false;
  $('#neonConnect').textContent = 'CONNECT';
  if (ok) {
    try {
      await neonSQL`SELECT 1`;
      updateSettingsUI();
      $('#settingsMsg').textContent = 'Connected to NeonDB!';
      $('#settingsMsg').className = 'setup-msg success';
    } catch (err) {
      clearNeonConfig();
      neonSQL = null;
      updateSyncDot('offline');
      updateSettingsUI();
      $('#settingsMsg').textContent = 'Connection failed: ' + (err.message || 'Check your connection string');
      $('#settingsMsg').className = 'setup-msg error';
    }
  } else {
    clearNeonConfig();
    updateSettingsUI();
    $('#settingsMsg').textContent = 'Failed to load Neon driver.';
    $('#settingsMsg').className = 'setup-msg error';
  }
});

$('#neonDisconnect').addEventListener('click', () => {
  neonSQL = null;
  clearNeonConfig();
  updateSyncDot('offline');
  updateSettingsUI();
  $('#settingsMsg').textContent = 'Disconnected.';
  $('#settingsMsg').className = 'setup-msg';
});

$('#neonTest').addEventListener('click', async () => {
  if (!neonSQL) {
    await initNeon();
  }
  if (!neonSQL) {
    $('#settingsMsg').textContent = 'Not connected';
    $('#settingsMsg').className = 'setup-msg error';
    return;
  }
  $('#neonTest').disabled = true;
  $('#neonTest').textContent = 'TESTING...';
  try {
    const result = await neonSQL`SELECT COUNT(*) as n FROM sessions`;
    $('#settingsMsg').textContent = `Connection OK — ${result[0].n} sessions in database`;
    $('#settingsMsg').className = 'setup-msg success';
    updateSyncDot('online');
  } catch (err) {
    $('#settingsMsg').textContent = 'Test failed: ' + (err.message || 'Unknown error');
    $('#settingsMsg').className = 'setup-msg error';
    updateSyncDot('offline');
  }
  $('#neonTest').disabled = false;
  $('#neonTest').textContent = 'TEST CONNECTION';
});

$('#exportData').addEventListener('click', () => {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ironppl-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
});

$('#statsBtn').addEventListener('click', () => {
  state.activeTab = 8;
  saveState();
  renderNav();
  renderPages();
  updateFinishBar();
});

updateWeekDisplay();
renderGreeting();
renderStats();

  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Prevent iOS rubber-band scrolling on fixed elements
document.addEventListener('touchmove', function(e) {
  if (e.target.closest('.modal-overlay, .rest-timer-bar')) {
    e.preventDefault();
  }
}, { passive: false });

// Wake lock to keep screen on during workout
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.activeTab >= 0 && state.activeTab <= 5) {
    requestWakeLock();
  }
});
if (state.activeTab >= 0 && state.activeTab <= 5) requestWakeLock();
